<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender AI</title>

    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">

    <!-- Bootstrap CSS and JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/fontawesome-6.7.2/css/fontawesome.css" rel="stylesheet" />
    <link href="/fontawesome-6.7.2/css/brands.css" rel="stylesheet" />
    <link href="/fontawesome-6.7.2/css/solid.css" rel="stylesheet" />
    <link href="/fontawesome-6.7.2/css/sharp-thin.css" rel="stylesheet" />
    <link href="/fontawesome-6.7.2/css/duotone-thin.css" rel="stylesheet" />
    <link href="/fontawesome-6.7.2/css/sharp-duotone-thin.css" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/ea527324f8.js" crossorigin="anonymous"></script>

    <script src="app.js" defer></script>

</head>
<body class="bg-dark text-light min-vh-100 d-flex align-items-center justify-content-center p-4">
    <div class="w-100" style="max-width:680px">

        <!-- Header -->
        <div class="text-center mb-4">
            <div style="font-size: 48px"><i class="fa-solid fa-book"></i></div>
            <h1 class="fw-bold mt-2">Book Recommender - AIxx</h1>
            <p>Describe your mood and what you are looking for.</p>
        </div>

        <!-- Chat Box -->
        <div id="chatBox" class="border border-secondary rounded-3 p-3 mb-3 d-flex flex-column gap-3" style="min-height:300px; max-height:440px; overflow-y:auto; background:rgba(255,255,255,0.03);"></div>
        
        <!-- Input -->
        <div class="d-flex gap-2">
            <textarea id="userInput" rows="1" class="form-control bg-dark text-light border-secondary" placeholder="Ex: Gostaria de ler algo introspectivo, melancólico..."></textarea>
            <button id="btn" class="btn btn-light fw-semibold px-4">Send</button>
        </div>
        <div class="text-center small text-secondary opacity-75 mt-3">
            Powered by Gemini AI
        </div>
    </div>
</body>
</html>
